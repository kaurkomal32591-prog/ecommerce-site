<!DOCTYPE html>
<html>
  <head>
    <title>Products</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
  </head>

  <body>
    <nav>
      <h1>MyShop</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>

    <h2 class="title">Products</h2>

    <div class="products-grid">
      <div class="product">
        <a href="product.html">
          <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Shoes">
        </a>
        <h3><a href="product.html">Shoes</a></h3>
        <p>$50</p>
        <button onclick="addToCart('Shoes', 50)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600" alt="T-Shirt">
        <h3>T-Shirt</h3>
        <p>$25</p>
        <button onclick="addToCart('T-Shirt', 25)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?w=600" alt="Jacket">
        <h3>Jacket</h3>
        <p>$80</p>
        <button onclick="addToCart('Jacket', 80)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=600" alt="Backpack">
        <h3>Backpack</h3>
        <p>$40</p>
        <button onclick="addToCart('Backpack', 40)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" alt="Watch">
        <h3>Watch</h3>
        <p>$120</p>
        <button onclick="addToCart('Watch', 120)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1521369909029-2afed882baee?w=600" alt="Cap">
        <h3>Cap</h3>
        <p>$15</p>
        <button onclick="addToCart('Cap', 15)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600" alt="Sunglasses">
        <h3>Sunglasses</h3>
        <p>$30</p>
        <button onclick="addToCart('Sunglasses', 30)">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" alt="Headphones">
        <h3>Headphones</h3>
        <p>$60</p>
        <button onclick="addToCart('Headphones', 60)">Add to Cart</button>
      </div>
    </div>
  </body>
</html>
